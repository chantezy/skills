name: Publish MCP Package

on:
  push:
    branches: [main]
    paths:
      - 'Requirements content analysis/**'
      - 'b-design-diverge/**'
      - 'interaction-design-eval/**'
      - 'interaction-spec/**'
      - 'prd-generator/**'
      - 'mcp-server/src/**'
      - 'mcp-server/package.json'
      - 'mcp-server/package-lock.json'
      - 'mcp-server/tsconfig.json'
      - 'mcp-server/README.md'
      - 'mcp-server/scripts/**'
      - '.github/workflows/publish-mcp.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync skills
        run: bash mcp-server/scripts/sync-skills.sh

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Bump version and publish
        working-directory: mcp-server
        run: |
          for i in 1 2 3 4 5; do
            npm version patch --no-git-tag-version
            if npm publish --provenance --access public; then
              echo "Published successfully."
              exit 0
            fi
            echo "Publish attempt $i failed (likely version conflict), bumping again..."
          done
          echo "Failed after 5 attempts."
          exit 1
        # Trusted Publisher 模式：通过 OIDC + npm 端仓库绑定认证，
        # 无需 NPM_TOKEN。前提：已在 npm 包设置页将本 GitHub 仓库
        # 链接到 @chantezy/mcp-product-design（Publishing access → 关联仓库）。
